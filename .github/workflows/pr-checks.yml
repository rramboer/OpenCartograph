name: Pull Request Checks

on:
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened]

env:
  MAX_LINE_LENGTH: 160

jobs:
  lint-and-validate:
    name: Lint and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pylint mypy pytest

      - name: Validate Python syntax
        run: python -m compileall . -q

      - name: Test CLI help
        run: python -m opencartograph --help

      - name: Test list themes
        run: python -m opencartograph --list-themes

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --statistics --max-line-length=${{ env.MAX_LINE_LENGTH }}

      - name: Lint with pylint
        run: pylint . --max-line-length=${{ env.MAX_LINE_LENGTH }}
        continue-on-error: true

      - name: Type check with mypy
        run: mypy . --ignore-missing-imports --no-strict-optional

  dependency-check:
    name: Security and Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Audit dependencies with pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
